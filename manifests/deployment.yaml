spec:
      containers:
      - name: nginx
        image: nginx:1.21.6
        ports:
        - containerPort: 80
        command: ["/bin/sh", "-c"]
        args:
          # Копируем из Read-Only папки в рабочую, правим и запускаем
          - cp /tmp/proto/index.html /usr/share/nginx/html/index.html && sed -i "s/POD_NAME_HERE/$HOSTNAME/g" /usr/share/nginx/html/index.html && nginx -g 'daemon off;'
        volumeMounts:
        - name: html-proto        # Источник (ConfigMap)
          mountPath: /tmp/proto
        - name: html-writable     # Куда можно писать
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-proto
        configMap:
          name: nginx-index-html
      - name: html-writable       # Временная папка в памяти
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
